<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>LoveOS v2.0</title>

<style>
:root{
  --bg:#070A0F;
  --text:#D7E1FF;
  --muted:#8EA2D6;
  --accent:#7CFFB2;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.terminal{
  width:90%;
  max-width:900px;
  height:80vh;
  overflow:auto;
  padding:20px;
  border:1px solid rgba(255,255,255,.1);
  border-radius:16px;
  background:rgba(10,15,25,.95);
}

.line{display:flex; gap:10px; padding:4px 0}
.prompt{color:var(--accent)}
.text{white-space:pre-wrap}
.muted{color:var(--muted)}
.red{color:#ff4d6d;}

input{
  background:transparent;
  border:none;
  outline:none;
  color:var(--text);
  font:inherit;
  flex:1;
}
input::placeholder{
  color:var(--muted);
  opacity:1;
}

.caret{
  display:inline-block;
  width:9px;
  height:16px;
  background:var(--accent);
  margin-left:6px;
  animation:blink 1s steps(2,start) infinite;
}

@keyframes blink { to { visibility:hidden; } }

button{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.2);
  color:var(--text);
  padding:10px 14px;
  border-radius:10px;
  margin:8px 6px 0 0;
  cursor:pointer;
}
</style>
</head>

<body>
<div class="terminal" id="terminal"></div>

<script>
const term = document.getElementById("terminal");
let speedBoost = 1;
document.addEventListener("click", ()=> speedBoost = 0.8);

function scrollBottom(){ term.scrollTop = term.scrollHeight; }
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

async function typeInto(span, text){
  const node = document.createTextNode("");
  const caret = document.createElement("span");
  caret.className = "caret";

  span.textContent="";
  span.appendChild(node);
  span.appendChild(caret);

  const MIN_DURATION = 3000;  // 3s minimum typing per line
  const charDelay = 35;

  const start = Date.now();

  for(let i=0;i<text.length;i++){
    node.data += text[i];
    scrollBottom();
    await sleep(charDelay * speedBoost);
  }

  const elapsed = Date.now() - start;
  if(elapsed < MIN_DURATION){
    await sleep(MIN_DURATION - elapsed);
  }

  caret.remove();
}

async function printLine({prompt=">", text="", cls=""}){
  const row = document.createElement("div");
  row.className="line";

  const p = document.createElement("span");
  p.className="prompt";
  p.textContent=prompt;

  const t = document.createElement("span");
  t.className="text "+cls;

  row.appendChild(p);
  row.appendChild(t);
  term.appendChild(row);
  scrollBottom();

  await typeInto(t,text);

  // 3-second breathing space after EVERY line
  await sleep(3000);
}

let step = 0;

const questions = [
  { q:"Enter password:", a:"22/09/24", r:"Access granted." },
  { q:"What is the most important month of the year?", a:"february", r:"Correct - the time i had to cancel TOTOS, to call u home" },
  { q:'When did we first say "I love you"?', a:"graduation night", r:"VERY NICEEE - the night we photobombed everyone while making out crazy style" },
  { q:"Who do you listen to when you're excited to go on a date?", a:"nicki minaj", r:"This one was an old call back, im impressed very good" }
];

async function ask(){
  const current = questions[step];

  await printLine({prompt:">", text:current.q});

  const row = document.createElement("div");
  row.className="line";

  const p = document.createElement("span");
  p.className="prompt";
  p.textContent=">";

  const input=document.createElement("input");
  input.placeholder="Type answer and press Enter...";

  row.appendChild(p);
  row.appendChild(input);
  term.appendChild(row);
  scrollBottom();
  input.focus();

  input.addEventListener("keydown", async e=>{
    if(e.key!=="Enter") return;

    input.disabled=true;
    const val=input.value.trim().toLowerCase();

    if(val===current.a){
      await printLine({prompt:"", text:current.r});
      step++;
      if(step<questions.length){ ask(); }
      else{
        await printLine({prompt:"", text:"Identity verified."});
        await printLine({prompt:"", text:"Memory back."});
        install();
      }
    }else{
      await printLine({prompt:"", text:"You should know this by now...", cls:"muted"});
      await sleep(3000);
      input.disabled=false;
      input.value="";
      input.focus();
    }
  });
}

  await printLine({prompt:"", text:"Optimizing: text_response_time"});
  await printLine({prompt:"", text:"Finalizing: anniversary_mode"});
  await printLine({prompt:"", text:"✔ Installation complete."});

  // ===== INSERTED SECTION (ORDER YOU CONFIRMED) =====

  await printLine({prompt:"", text:"Hi Sheryl, Welcome back"});

  await printLine({prompt:">", text:"device.profile --traits"});

  // ===== THE REST (Release Notes) =====

  await printLine({prompt:">", text:"release.notes --LoveOS v2.0"});

  await printLine({prompt:"", text:"New Features Added"});

  await printLine({prompt:"", text:"• so much new music"});

  await printLine({prompt:"", text:"Performance Improvements"});

  await printLine({prompt:"", text:"• enhanced communication algorithm"});

  await printLine({prompt:"", text:"Bug Fixes"});
  await printLine({prompt:"", text:"• random silence crash resolved"});
  await printLine({prompt:"", text:"• mood swing buffering improved"});

  // ===== MEMORY LINES (AFTER THE REST) =====

  await printLine({prompt:">", text:"memory.cache --restore full_archive"});
  await printLine({prompt:"", text:"Restoring relationship logs..."});
  await printLine({prompt:"", text:"> First Toto's after dating"});
  await printLine({prompt:"", text:"> Our one month date when i got the best cake ever (spongebob one as well!)"});
  await printLine({prompt:"", text:"> Our first finish together OOF"});
  await printLine({prompt:"", text:"> Thicker than a snickers shortsss"});
  await printLine({prompt:"", text:"> when we celebrated the RCB IPL win too much"});
  await printLine({prompt:"", text:"> SO MANY AUTO HANDSIES"});
  await printLine({prompt:"", text:"> my graduation night OUR FIRST ILOVEU"});
  await printLine({prompt:"", text:"> SEPTEMBER 22ND DATE RECREATION WITH THE ZAWGGGGGG"});
  await printLine({prompt:"", text:"> OCT-NOV ON DA LOW CAUSE OF PAPERS BUT GOOD DATE NIGHTS"});

  // ===== CONTINUE ORIGINAL FLOW =====

  await printLine({prompt:"", text:"LoveOS v2.0 is now running smoothly."});
  await printLine({prompt:"", text:"Status: Still choosing you. Daily."});
  await printLine({prompt:"", text:"No trial period. No auto-expiration. No hidden clauses."});
  await printLine({prompt:"", text:"Would you like to continue this journey into Version 2.0?"});

  const yes = document.createElement("button");
  yes.textContent="Always";
  yes.onclick=final;

  const obv = document.createElement("button");
  obv.textContent="Obviously";
  obv.onclick=final;

  term.appendChild(yes);
  term.appendChild(obv);
  scrollBottom();
}

async function final(){

  await printLine({prompt:"", text:"Confirmation received."});
  await printLine({prompt:"", text:'Commit message: "One year down, ship\'s sailing smooooth"'});
  await printLine({prompt:"", text:"You make loving so much fun..."});

  // Extra dramatic pause before red line
  await sleep(4000);

  // (Red, suggestive, non-explicit)
  await printLine({prompt:"", text:"Red Alert: now take your clothes off, oil up and lets have sex.", cls:"red"});

  await printLine({prompt:"", text:"You can close the terminal now, and give the sloppiest head to your closest mogger"});
}

async function start(){
  await printLine({prompt:"", text:"LoveOS v2.0"});
  await printLine({prompt:"", text:"Access Restricted."});
  await printLine({prompt:"", text:"This system contains one year of stored memories."});
  await printLine({prompt:"", text:"Unauthorized users will not be granted access.", cls:"muted"});
  ask();
}

start();
</script>
</body>
</html>
